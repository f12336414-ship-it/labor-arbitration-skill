name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-test.lock
      - name: Compile runtime scripts
        working-directory: labor-arbitration-skill
        run: python -m compileall -q scripts
      - name: Run tests
        working-directory: labor-arbitration-skill
        run: python -m unittest discover -s tests -v

  coverage:
    name: Branch coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
      - name: Install locked test dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-test.lock
      - name: Measure parent and subprocess coverage
        run: |
          python -m coverage erase
          python -m coverage run -m unittest discover -s labor-arbitration-skill/tests -t labor-arbitration-skill -v
          python -m coverage combine
          python -m coverage report --fail-under=88

  supply-chain:
    name: Runtime dependency audit and SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
      - name: Install locked audit tools
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.lock
      - name: Audit locked runtime dependencies
        run: python -m pip_audit -r requirements.lock --require-hashes --progress-spinner off
      - name: Reproduce committed runtime SBOM
        run: cyclonedx-py requirements requirements.lock --output-reproducible --of JSON -o sbom.cdx.json --validate
      - name: Verify SBOM is current
        run: git diff --exit-code -- sbom.cdx.json
