name: Feature request
description: 提议不削弱可靠性门禁的新能力
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: 说明用户问题、受支持场景和不在范围内的内容。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Reliability, privacy, and compatibility risks
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Testable acceptance criteria
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Data confirmation
      options:
        - label: 我没有附带真实案件材料或个人信息。
          required: true
