name: Bug report
description: 使用合成数据报告可复现的软件缺陷
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        不要提交真实案件材料、个人信息、密钥或令牌。安全漏洞请使用 Security 页的私密报告功能。
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Actual behavior
      description: 使用最小合成示例说明实际行为。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: 提供不含真实案件信息的命令、输入结构和输出。
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Data confirmation
      options:
        - label: 我确认报告只包含合成数据且不包含任何真实案件或个人信息。
          required: true
